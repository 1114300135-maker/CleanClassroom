、<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>標準教室平面圖 (8x7)</title>
    <style>
        :root {
            --bg-color: #ecf0f1;
            --wall-color: #2c3e50;
            --window-color: #3498db;
            --desk-color: #8e44ad; /* 換個專業的紫色系 */
            --blackboard-color: #1e3d2f; /* 經典深綠色黑板 */
        }
        body {
            font-family: sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 { color: var(--wall-color); }
        
        /* SVG 佈局控制 */
        svg { border: 4px solid var(--wall-color); background: #fff; border-radius: 5px; }
        .window { stroke: var(--window-color); stroke-width: 8; stroke-linecap: round; opacity: 0.6; }
        .door-gap { stroke: #fff; stroke-width: 6; } /* 門的開口 */
        .door-arc { fill: none; stroke: #bdc3c7; stroke-dasharray: 4; }
        .blackboard { fill: var(--blackboard-color); rx: 2; }
        .desk { fill: var(--desk-color); rx: 4; cursor: pointer; transition: 0.2s; }
        .desk:hover { fill: #9b59b6; transform: scale(1.05); transform-origin: center; }
        .text-label { font-size: 10px; fill: white; pointer-events: none; text-anchor: middle; }
    </style>
</head>
<body>

    <h1>教室平面配置圖</h1>
    <p>規格：標準長方形 | 左右各 6 窗 | 右側前後門 | 8x7 座位</p>

    <div class="container">
        <svg width="800" height="600" viewBox="0 0 800 600">
            
            <rect x="150" y="15" width="500" height="12" class="blackboard" />
            <text x="400" y="50" style="text-anchor: middle; font-weight: bold; fill: #2c3e50;">講台區 (大黑板)</text>

            <g id="left-windows">
                <line x1="0" y1="100" x2="0" y2="160" class="window" />
                <line x1="0" y1="180" x2="0" y2="240" class="window" />
                <line x1="0" y1="260" x2="0" y2="320" class="window" />
                <line x1="0" y1="340" x2="0" y2="400" class="window" />
                <line x1="0" y1="420" x2="0" y2="480" class="window" />
                <line x1="0" y1="500" x2="0" y2="560" class="window" />
            </g>
            <g id="right-windows">
                <line x1="800" y1="180" x2="800" y2="230" class="window" />
                <line x1="800" y1="250" x2="800" y2="300" class="window" />
                <line x1="800" y1="320" x2="800" y2="370" class="window" />
                <line x1="800" y1="390" x2="800" y2="440" class="window" />
                <line x1="800" y1="460" x2="800" y2="510" class="window" />
                <line x1="800" y1="530" x2="800" y2="580" class="window" />
            </g>

            <line x1="800" y1="60" x2="800" y2="130" class="door-gap" />
            <path d="M 800 60 Q 730 60 730 130" class="door-arc" />
            <text x="760" y="50" style="font-size: 12px; fill: #7f8c8d;">前門</text>

            <line x1="800" y1="500" x2="800" y2="570" class="door-gap" />
            <path d="M 800 570 Q 730 570 730 500" class="door-arc" />
            <text x="760" y="590" style="font-size: 12px; fill: #7f8c8d;">後門</text>

            <g id="seats"></g>
        </svg>
    </div>

    <script>
        const seatGroup = document.getElementById('seats');
        const rows = 8; // 縱深 8 排
        const cols = 7; // 橫寬 7 列
        
        // 設定間距讓座位居中
        const startX = 120;
        const startY = 120;
        const gapX = 85; 
        const gapY = 55;
        const w = 50;
        const h = 35;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const x = startX + (c * gapX);
                const y = startY + (r * gapY);
                
                // 座位
                const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                rect.setAttribute("x", x);
                rect.setAttribute("y", y);
                rect.setAttribute("width", w);
                rect.setAttribute("height", h);
                rect.setAttribute("class", "desk");
                
                // 編號
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", x + w/2);
                text.setAttribute("y", y + h/2 + 4);
                text.setAttribute("class", "text-label");
                text.textContent = `${r+1}-${c+1}`;

                seatGroup.appendChild(rect);
                seatGroup.appendChild(text);
            }
        }
    </script>
</body>
</html>
