<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的理想教室平面圖</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --desk-color: #e67e22;
            --wall-color: #34495e;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            background-color: var(--primary-color);
            color: white;
            width: 100%;
            padding: 1rem 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .container {
            max-width: 900px;
            width: 95%;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .controls {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        button {
            padding: 8px 16px;
            cursor: pointer;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 4px;
            transition: 0.3s;
        }
        button:hover { opacity: 0.8; }
        
        /* SVG 樣式 */
        #classroom-svg {
            width: 100%;
            height: auto;
            border: 2px solid var(--wall-color);
            border-radius: 8px;
            background: #fff;
        }
        .desk { fill: var(--desk-color); cursor: pointer; transition: 0.3s; }
        .desk:hover { fill: #d35400; }
        .wall { fill: var(--wall-color); }
        .label { font-size: 14px; font-weight: bold; fill: #333; pointer-events: none; }
        .door { fill: #95a5a6; }
        .area-label { font-size: 12px; fill: #7f8c8d; font-style: italic; }

        footer { margin-top: 20px; color: #7f8c8d; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <h1>教室佈局規劃系統</h1>
</header>

<div class="container">
    <div class="controls">
        <button onclick="alert('功能：導出為 PDF (需串接函式庫)')">導出圖形</button>
        <button onclick="location.reload()">重新整理</button>
    </div>

    <svg id="classroom-svg" viewBox="0 0 800 500">
        <rect x="10" y="10" width="780" height="480" fill="none" stroke="#34495e" stroke-width="5"/>
        
        <rect x="700" y="8" width="60" height="10" class="door"/>
        <text x="710" y="40" class="area-label">後門</text>

        <rect x="50" y="50" width="120" height="80" rx="5" class="desk" style="fill: #34495e;"/>
        <text x="75" y="95" style="fill: white; font-size: 14px;">教師桌</text>
        <rect x="200" y="20" width="300" height="10" fill="#bdc3c7"/> <text x="310" y="50" class="label">數位白板區</text>

        <g class="group" transform="translate(100, 200)">
            <circle cx="50" cy="50" r="40" fill="#ecf0f1" stroke="#bdc3c7"/>
            <rect x="35" y="10" width="30" height="20" rx="3" class="desk"/>
            <rect x="35" y="70" width="30" height="20" rx="3" class="desk"/>
            <rect x="5" y="40" width="30" height="20" rx="3" class="desk" transform="rotate(90 20 50)"/>
            <rect x="65" y="40" width="30" height="20" rx="3" class="desk" transform="rotate(90 80 50)"/>
            <text x="32" y="55" class="label" style="font-size: 10px;">小組 A</text>
        </g>

        <g class="group" transform="translate(350, 200)">
            <circle cx="50" cy="50" r="40" fill="#ecf0f1" stroke="#bdc3c7"/>
            <rect x="35" y="10" width="30" height="20" rx="3" class="desk"/>
            <rect x="35" y="70" width="30" height="20" rx="3" class="desk"/>
            <rect x="5" y="40" width="30" height="20" rx="3" class="desk" transform="rotate(90 20 50)"/>
            <rect x="65" y="40" width="30" height="20" rx="3" class="desk" transform="rotate(90 80 50)"/>
            <text x="32" y="55" class="label" style="font-size: 10px;">小組 B</text>
        </g>

        <g class="group" transform="translate(600, 200)">
            <circle cx="50" cy="50" r="40" fill="#ecf0f1" stroke="#bdc3c7"/>
            <rect x="35" y="10" width="30" height="20" rx="3" class="desk"/>
            <rect x="35" y="70" width="30" height="20" rx="3" class="desk"/>
            <rect x="5" y="40" width="30" height="20" rx="3" class="desk" transform="rotate(90 20 50)"/>
            <rect x="65" y="40" width="30" height="20" rx="3" class="desk" transform="rotate(90 80 50)"/>
            <text x="32" y="55" class="label" style="font-size: 10px;">小組 C</text>
        </g>

        <rect x="100" y="420" width="600" height="50" rx="5" fill="#dfe6e9"/>
        <text x="350" y="450" class="label">資源收納櫃 / 圖書區</text>

        <line x1="10" y1="200" x2="10" y2="400" stroke="#3498db" stroke-width="8"/>
        <text x="20" y="310" class="area-label" transform="rotate(90 20 310)">大面窗戶</text>
    </svg>
</div>

<footer>
    © 2026 教室設計工作室 - 由 GitHub Pages 提供服務
</footer>

<script>
    // 簡單的點擊互動
    document.querySelectorAll('.desk').forEach(desk => {
        desk.addEventListener('click', function() {
            const group = this.parentElement.querySelector('.label')?.textContent || "教師桌";
            alert('你點擊了 ' + group + ' 的座位');
        });
    });
</script>

</body>
</html>
