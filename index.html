<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8x7 完整功能教室平面圖</title>
    <style>
        :root {
            --wall: #2c3e50;
            --corridor: #ecf0f1;
            --desk: #3498db;
            --storage: #f39c12;
            --cleaning: #95a5a6;
            --platform: #bdc3c7;
        }
        body { font-family: "Microsoft JhengHei", sans-serif; display: flex; flex-direction: column; align-items: center; background: #f4f4f4; padding: 20px; }
        .canvas-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        svg { border: 2px solid var(--wall); background: #fff; }
        .label { font-size: 12px; fill: #333; font-weight: bold; text-anchor: middle; }
        .desk { fill: var(--desk); rx: 3; cursor: pointer; }
        .desk:hover { fill: #2980b9; }
        .area-box { fill: #f9f9f9; stroke: #ddd; stroke-dasharray: 4; }
    </style>
</head>
<body>

    <h1>我的專屬教室平面圖</h1>
    <p>配置：8x7 座位 | 右側走道 | 內置物櫃 | 左前講台 | 左後掃具櫃</p>

    <div class="canvas-card">
        <svg width="900" height="650" viewBox="0 0 900 650">
            
            <rect x="800" y="0" width="100" height="650" fill="var(--corridor)" />
            <text x="850" y="325" transform="rotate(90 850 325)" class="label" style="fill:#7f8c8d">室外走廊</text>

            <rect x="20" y="20" width="780" height="610" fill="none" stroke="var(--wall)" stroke-width="4"/>

            <rect x="150" y="15" width="500" height="10" fill="#1e3d2f" />

            <rect x="25" y="25" width="120" height="100" class="area-box" style="fill:#eee" />
            <rect x="40" y="45" width="80" height="50" fill="var(--platform)" rx="5" />
            <text x="80" y="75" class="label">講台</text>

            <rect x="25" y="530" width="80" height="95" fill="var(--cleaning)" />
            <text x="65" y="585" class="label" style="fill:white">掃具櫃</text>

            <rect x="740" y="150" width="55" height="350" fill="var(--storage)" />
            <text x="767" y="325" transform="rotate(90 767 325)" class="label" style="fill:white">學生置物櫃</text>

            <rect x="798" y="50" width="5" height="80" fill="white" /> <path d="M 800 50 Q 730 50 730 120" fill="none" stroke="#bdc3c7" stroke-dasharray="3" />
            <text x="760" y="40" class="label">前門</text>

            <rect x="798" y="540" width="5" height="80" fill="white" /> <path d="M 800 620 Q 730 620 730 550" fill="none" stroke="#bdc3c7" stroke-dasharray="3" />
            <text x="760" y="640" class="label">後門</text>

            <g id="windows">
                <line x1="20" y1="150" x2="20" y2="200" stroke="#3498db" stroke-width="6" />
                <line x1="20" y1="220" x2="20" y2="270" stroke="#3498db" stroke-width="6" />
                <line x1="20" y1="290" x2="20" y2="340" stroke="#3498db" stroke-width="6" />
                <line x1="20" y1="360" x2="20" y2="410" stroke="#3498db" stroke-width="6" />
                <line x1="20" y1="430" x2="20" y2="480" stroke="#3498db" stroke-width="6" />
                <line x1="20" y1="500" x2="20" y2="550" stroke="#3498db" stroke-width="6" />
            </g>

            <g id="seat-grid"></g>
        </svg>
    </div>

    <script>
        const grid = document.getElementById('seat-grid');
        const rows = 8;
        const cols = 7;
        const startX = 150; // 避開講台與置物櫃
        const startY = 150;
        const gapX = 80;
        const gapY = 55;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const x = startX + (c * gapX);
                const y = startY + (r * gapY);
                
                const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                rect.setAttribute("x", x);
                rect.setAttribute("y", y);
                rect.setAttribute("width", 45);
                rect.setAttribute("height", 30);
                rect.setAttribute("class", "desk");
                
                const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
                txt.setAttribute("x", x + 22);
                txt.setAttribute("y", y + 20);
                txt.setAttribute("style", "fill:white; font-size:9px; text-anchor:middle; pointer-events:none;");
                txt.textContent = `${r+1}-${c+1}`;

                grid.appendChild(rect);
                grid.appendChild(txt);
            }
        }
    </script>
</body>
</html>
