<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8x7 大型教室平面圖</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --wall-color: #2c3e50;
            --window-color: #5dade2;
            --desk-color: #d35400;
            --chair-color: #34495e;
            --floor-color: #ffffff;
        }
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .canvas-container {
            background: var(--floor-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 8px;
            padding: 20px;
            max-width: 100%;
        }
        h1 { color: var(--wall-color); margin-bottom: 10px; }
        p { color: #666; margin-bottom: 20px; }

        /* SVG 樣式 */
        svg {
            display: block;
            margin: auto;
            max-height: 85vh; /* 確保在螢幕內 */
        }
        .window { stroke: var(--window-color); stroke-width: 6; stroke-linecap: round; }
        .desk { fill: var(--desk-color); rx: 2; cursor: pointer; transition: 0.2s; }
        .desk:hover { fill: #e67e22; stroke: #333; stroke-width: 1; }
        .text-label { font-size: 12px; fill: #7f8c8d; pointer-events: none; }
        .front-label { font-size: 18px; font-weight: bold; fill: var(--wall-color); }
    </style>
</head>
<body>

    <h1>教室平面配置圖</h1>
    <p>規格：直式長方型 | 兩側各 6 窗 | 8x7 座位區</p>

    <div class="canvas-container">
        <svg width="500" height="750" viewBox="0 0 600 900">
            <rect x="20" y="20" width="560" height="860" fill="none" stroke="#2c3e50" stroke-width="4"/>

            <line x1="20" y1="150" x2="20" y2="210" class="window" />
            <line x1="20" y1="260" x2="20" y2="320" class="window" />
            <line x1="20" y1="370" x2="20" y2="430" class="window" />
            <line x1="20" y1="480" x2="20" y2="540" class="window" />
            <line x1="20" y1="590" x2="20" y2="650" class="window" />
            <line x1="20" y1="700" x2="20" y2="760" class="window" />
            
            <line x1="580" y1="150" x2="580" y2="210" class="window" />
            <line x1="580" y1="260" x2="580" y2="320" class="window" />
            <line x1="580" y1="370" x2="580" y2="430" class="window" />
            <line x1="580" y1="480" x2="580" y2="540" class="window" />
            <line x1="580" y1="590" x2="580" y2="650" class="window" />
            <line x1="580" y1="700" x2="580" y2="760" class="window" />

            <rect x="200" y="40" width="200" height="10" fill="#95a5a6" /> <text x="250" y="80" class="front-label">講台前方</text>
            <rect x="250" y="100" width="100" height="50" fill="#bdc3c7" rx="3" /> <text x="278" y="130" style="font-size:12px">教師桌</text>

            <rect x="578" y="800" width="4" height="60" fill="#f0f2f5" /> <path d="M 580 800 Q 520 800 520 860" fill="none" stroke="#7f8c8d" stroke-dasharray="4" />
            <text x="530" y="790" class="text-label">後門</text>

            <g id="student-area"></g>
        </svg>
    </div>

    <script>
        const studentArea = document.getElementById('student-area');
        const rows = 8; // 直向 8 排
        const cols = 7; // 橫向 7 列
        const startX = 85;
        const startY = 180;
        const gapX = 65;
        const gapY = 85;
        const deskW = 45;
        const deskH = 35;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                // 建立桌子
                const x = startX + (c * gapX);
                const y = startY + (r * gapY);
                
                const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                rect.setAttribute("x", x);
                rect.setAttribute("y", y);
                rect.setAttribute("width", deskW);
                rect.setAttribute("height", deskH);
                rect.setAttribute("class", "desk");
                
                // 加上編號標籤
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", x + 12);
                text.setAttribute("y", y + 22);
                text.setAttribute("style", "fill: white; font-size: 10px; pointer-events: none;");
                text.textContent = `${r+1}-${c+1}`;

                studentArea.appendChild(rect);
                studentArea.appendChild(text);
            }
        }
    </script>
</body>
</html>
